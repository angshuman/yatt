<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YATT — Gantt Editor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --panel:     #1e293b;
      --panel-2:   #162032;
      --border:    #334155;
      --border-hi: #3b82f6;
      --text:      #e2e8f0;
      --text-muted:#94a3b8;
      --accent:    #3b82f6;
      --accent-hi: #60a5fa;
      --red:       #ef4444;
      --green:     #22c55e;
      --toolbar-h: 48px;
      --status-h:  32px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    /* ─── Layout ──────────────────────────────────────────────── */

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ─── Toolbar ─────────────────────────────────────────────── */

    #toolbar {
      flex: 0 0 var(--toolbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      z-index: 10;
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent-hi);
      user-select: none;
      flex-shrink: 0;
    }

    .logo span {
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0;
      font-size: 13px;
      margin-left: 8px;
    }

    .toolbar-center {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    #examples-select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
      max-width: 220px;
    }

    #examples-select:hover, #examples-select:focus {
      border-color: var(--accent);
    }

    #examples-select option {
      background: var(--panel);
    }

    .toolbar-right {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .view-toggle {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .view-toggle button {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .view-toggle button:not(:last-child) {
      border-right: 1px solid var(--border);
    }

    .view-toggle button:hover {
      background: var(--panel);
      color: var(--text);
    }

    .view-toggle button.active {
      background: var(--accent);
      color: #fff;
    }

    /* ─── Workspace ───────────────────────────────────────────── */

    #workspace {
      flex: 1;
      display: flex;
      min-height: 0;
      height: calc(100vh - var(--toolbar-h) - var(--status-h));
    }

    #editor-pane {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    #editor {
      flex: 1;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      font-size: 14px;
      line-height: 1.6;
      border: none;
      padding: 20px;
      resize: none;
      outline: none;
      tab-size: 2;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #editor::-webkit-scrollbar { width: 6px; }
    #editor::-webkit-scrollbar-track { background: transparent; }
    #editor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ─── Divider ─────────────────────────────────────────────── */

    #divider {
      flex: 0 0 4px;
      background: var(--border);
      cursor: col-resize;
      transition: background 0.15s;
      position: relative;
      z-index: 5;
    }

    #divider:hover, #divider.dragging {
      background: var(--accent);
    }

    /* ─── Preview ─────────────────────────────────────────────── */

    #preview-pane {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--panel-2);
      min-width: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #preview-pane::-webkit-scrollbar { width: 6px; }
    #preview-pane::-webkit-scrollbar-track { background: transparent; }
    #preview-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    #preview {
      padding: 28px 32px;
      max-width: 960px;
      margin: 0 auto;
    }

    /* ─── Markdown Prose ──────────────────────────────────────── */

    #preview h1,
    #preview h2,
    #preview h3,
    #preview h4 {
      color: var(--text);
      font-weight: 600;
      line-height: 1.3;
      margin-top: 1.6em;
      margin-bottom: 0.5em;
    }

    #preview h1 { font-size: 1.8em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; margin-top: 0; }
    #preview h2 { font-size: 1.4em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
    #preview h3 { font-size: 1.15em; }
    #preview h4 { font-size: 1em; }

    #preview p {
      color: var(--text);
      line-height: 1.75;
      margin-bottom: 1em;
    }

    #preview ul, #preview ol {
      margin: 0.5em 0 1em 1.5em;
      line-height: 1.75;
    }

    #preview li { margin-bottom: 0.25em; }

    #preview a { color: var(--accent-hi); text-decoration: underline; text-underline-offset: 2px; }
    #preview a:hover { color: #93c5fd; }

    #preview strong { color: #f1f5f9; font-weight: 600; }
    #preview em { color: #cbd5e1; font-style: italic; }

    #preview blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px;
      margin: 1em 0;
      background: rgba(59,130,246,0.06);
      border-radius: 0 4px 4px 0;
      color: var(--text-muted);
    }

    #preview blockquote p { margin: 0; }

    #preview hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5em 0;
    }

    #preview table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
      font-size: 13px;
    }

    #preview th, #preview td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }

    #preview th {
      background: var(--panel);
      color: var(--text);
      font-weight: 600;
    }

    #preview td { color: var(--text-muted); }
    #preview tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    /* Inline code */
    #preview :not(pre) > code {
      background: var(--panel);
      color: #f472b6;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.88em;
    }

    /* Code blocks (non-yatt) */
    #preview pre {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      overflow-x: auto;
      margin: 1em 0;
      font-size: 13px;
      line-height: 1.5;
    }

    #preview pre code {
      background: none;
      color: inherit;
      padding: 0;
      font-size: inherit;
    }

    /* ─── YATT blocks ─────────────────────────────────────────── */

    .yatt-block {
      margin: 20px 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .yatt-block svg {
      max-width: 100%;
      display: block;
    }

    .yatt-errors {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      margin: 12px 0;
    }

    .yatt-errors p {
      color: var(--red);
      font-size: 12px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      margin: 0;
      line-height: 1.5;
    }

    .yatt-errors p + p { margin-top: 4px; }

    /* ─── View modes ──────────────────────────────────────────── */

    /* view-editor: hide preview */
    #workspace.view-editor #editor-pane {
      flex: 0 0 100%;
      border-right: none;
    }
    #workspace.view-editor #divider,
    #workspace.view-editor #preview-pane { display: none; }

    /* view-preview: hide editor */
    #workspace.view-preview #preview-pane { flex: 0 0 100%; }
    #workspace.view-preview #editor-pane,
    #workspace.view-preview #divider { display: none; }

    /* ─── Status bar ──────────────────────────────────────────── */

    #statusbar {
      flex: 0 0 var(--status-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      font-size: 11.5px;
      color: var(--text-muted);
      gap: 16px;
      user-select: none;
    }

    #status-errors { min-width: 80px; }
    #status-errors.has-errors { color: var(--red); font-weight: 600; }
    #status-chars { color: var(--text-muted); }
    .powered { color: var(--text-muted); opacity: 0.6; }

    /* ─── Responsive ──────────────────────────────────────────── */

    @media (max-width: 767px) {
      #divider { display: none; }
      #editor-pane { display: none; }
      #preview-pane { flex: 0 0 100%; }
      #workspace.view-editor #editor-pane { display: flex; flex: 0 0 100%; }
      #workspace.view-editor #preview-pane { display: none; }
      #workspace.view-preview #preview-pane { display: block; flex: 0 0 100%; }
      #workspace.view-preview #editor-pane { display: none; }
      #preview { padding: 16px; }
    }

    /* ─── Scrollbar for hljs ──────────────────────────────────── */

    .hljs { background: transparent !important; }
  </style>
</head>
<body>

<div id="app">
  <header id="toolbar">
    <div class="logo">YATT<span>Gantt Editor</span></div>
    <div class="toolbar-center">
      <select id="examples-select" title="Load an example">
        <option value="quick-start">Quick start</option>
        <option value="software-release">Software release</option>
        <option value="personal-project">Personal project</option>
        <option value="construction">Construction</option>
      </select>
    </div>
    <div class="toolbar-right">
      <div class="view-toggle">
        <button data-view="split" class="active">Split</button>
        <button data-view="editor">Editor</button>
        <button data-view="preview">Preview</button>
      </div>
    </div>
  </header>

  <div id="workspace">
    <div id="editor-pane">
      <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
    <div id="divider"></div>
    <div id="preview-pane">
      <div id="preview"></div>
    </div>
  </div>

  <footer id="statusbar">
    <span id="status-errors"></span>
    <span id="status-chars"></span>
    <span class="powered">Powered by YATT</span>
  </footer>
</div>

    'quick-start': `# My Project

Track tasks with simple plain-text syntax, rendered as Gantt charts.

\`\`\`yatt
title: Quick Start
start: 2026-01-05

// Sequential tasks — each starts after the previous
[done]   Requirements  | 2d | @alice | id:reqs
[active] Design        | 3d | @bob   | after:reqs | %60 | #design
[new]    Build         | 1w | @alice | after:design

// Named parallel blocks run concurrently
parallel: testing
[new] Unit tests | 3d | @bob
[new] E2E tests  | 2d | @alice
end: testing

// Milestone waits for the parallel block to complete
>> Launch | after:testing | +deadline

[>] Stretch feature | 5d   // deferred — won't affect schedule
\`\`\`

## Syntax cheat sheet

| Syntax | Meaning |
|--------|---------|
| \`[done]\` / \`[active]\` / \`[new]\` | Task status |
| \`2d\`, \`1w\`, \`3h\` | Duration (days / weeks / hours) |
| \`@person\` | Owner/assignee |
| \`after:id\` | Dependency |
| \`id:name\` | Give a task an ID for dependencies |
| \`#tag\` | Category tag |
| \`%60\` | Percent complete |
| \`>>\` | Milestone |
| \`[>]\` | Deferred task (excluded from schedule) |
| \`parallel:\` / \`end:\` | Concurrent task group |
| \`// comment\` | Inline comment |

Use the **examples dropdown** above to explore real-world plans.

  // ─── State ───────────────────────────────────────────────────────────────────

  let errorCount = 0;
  let debounceTimer = null;
  let isDragging = false;
  let dragStartX = 0;
  let dragStartWidth = 0;

  // ─── DOM refs ────────────────────────────────────────────────────────────────

  const editor        = document.getElementById('editor');
  const preview       = document.getElementById('preview');
  const workspace     = document.getElementById('workspace');
  const editorPane    = document.getElementById('editor-pane');
  const divider       = document.getElementById('divider');
  const examplesSelect = document.getElementById('examples-select');
  const statusErrors  = document.getElementById('status-errors');
  const statusChars   = document.getElementById('status-chars');
  const viewButtons   = document.querySelectorAll('.view-toggle button');

  // ─── Marked setup ────────────────────────────────────────────────────────────

  function setupMarked() {
    const renderer = new marked.Renderer();

    renderer.code = function (codeOrToken, infoOrLang, escaped) {
      // marked@12 passes a token object as first arg
      let code, lang;
      if (typeof codeOrToken === 'object' && codeOrToken !== null) {
        code = codeOrToken.text;
        lang = (codeOrToken.lang || '').trim().toLowerCase();
      } else {
        code = codeOrToken;
        lang = (infoOrLang || '').trim().toLowerCase();
      }

      if (lang === 'yatt') {
        return renderYattBlock(code);
      }

      // Non-yatt: use highlight.js
      let highlighted;
      try {
        if (lang && window.hljs && window.hljs.getLanguage(lang)) {
          highlighted = window.hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
        } else if (window.hljs) {
          highlighted = window.hljs.highlightAuto(code).value;
        } else {
          highlighted = escapeHtml(code);
        }
      } catch (e) {
        highlighted = escapeHtml(code);
      }
      const langClass = lang ? ` class="language-${escapeAttr(lang)}"` : '';
      return `<pre><code${langClass}>${highlighted}</code></pre>`;
    };

    marked.use({
      renderer,
      gfm: true,
      breaks: false,
    });
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escapeAttr(str) {
    return str.replace(/"/g, '&quot;');
  }

  // ─── YATT rendering ──────────────────────────────────────────────────────────

  function renderYattBlock(code) {
    const yatt = window.YattLib;

    if (!yatt || typeof yatt.render !== 'function') {
      errorCount++;
      return `<div class="yatt-errors"><p>YattLib not loaded — make sure yatt.bundle.js is present.</p></div>`;
    }

    try {
      const result = yatt.render(code, 'gantt');

      // result may be a string (SVG) or an object with { svg, errors } depending on build
      if (typeof result === 'string') {
        if (result.trim().startsWith('<svg') || result.trim().startsWith('<?xml')) {
          return `<div class="yatt-block">${result}</div>`;
        }
        // Treat as error message
        errorCount++;
        return `<div class="yatt-errors"><p>${escapeHtml(result)}</p></div>`;
      }

      if (result && typeof result === 'object') {
        const errors = result.errors || result.error ? [].concat(result.errors || result.error) : [];
        const svg = result.svg || result.output || result.html || '';

        let html = '';
        if (svg && (svg.trim().startsWith('<svg') || svg.trim().startsWith('<?xml'))) {
          html += `<div class="yatt-block">${svg}</div>`;
        }
        if (errors && errors.length) {
          errorCount += errors.length;
          const errorLines = errors
            .map(e => `<p>${escapeHtml(typeof e === 'string' ? e : (e.message || String(e)))}</p>`)
            .join('');
          html += `<div class="yatt-errors">${errorLines}</div>`;
        }
        if (!html) {
          // Nothing came back — treat as empty result
          return `<div class="yatt-block"><p style="color:var(--text-muted);padding:16px;font-size:13px;">(no output)</p></div>`;
        }
        return html;
      }

      errorCount++;
      return `<div class="yatt-errors"><p>Unexpected result from YattLib.render()</p></div>`;
    } catch (err) {
      errorCount++;
      const msg = err && err.message ? err.message : String(err);
      return `<div class="yatt-errors"><p>${escapeHtml(msg)}</p></div>`;
    }
  }

  // ─── Render preview ──────────────────────────────────────────────────────────

  function renderPreview() {
    errorCount = 0;

    const content = editor.value;
    let html = '';

    try {
      html = marked.parse(content);
    } catch (err) {
      html = `<div class="yatt-errors"><p>Markdown parse error: ${escapeHtml(err.message)}</p></div>`;
    }

    preview.innerHTML = html;

    // Update status bar
    updateStatusBar(content.length);
  }

  function updateStatusBar(charCount) {
    if (errorCount === 0) {
      statusErrors.textContent = 'No errors';
      statusErrors.classList.remove('has-errors');
    } else {
      statusErrors.textContent = `${errorCount} error${errorCount === 1 ? '' : 's'}`;
      statusErrors.classList.add('has-errors');
    }
    statusChars.textContent = `${charCount.toLocaleString()} chars`;
  }

  // ─── Debounced render ────────────────────────────────────────────────────────

  function scheduleRender() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(renderPreview, 200);
  }

  // ─── Tab key ─────────────────────────────────────────────────────────────────

  editor.addEventListener('keydown', function (e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = this.selectionStart;
      const end = this.selectionEnd;
      this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
      this.selectionStart = this.selectionEnd = start + 2;
      scheduleRender();
    }
  });

  editor.addEventListener('input', scheduleRender);

  // ─── Examples dropdown ───────────────────────────────────────────────────────

  examplesSelect.addEventListener('change', function () {
    const key = this.value;
    if (EXAMPLES[key] !== undefined) {
      editor.value = EXAMPLES[key];
      renderPreview();
    }
  });

  // ─── View toggle ─────────────────────────────────────────────────────────────

  viewButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      const view = this.dataset.view;
      viewButtons.forEach(b => b.classList.remove('active'));
      this.classList.add('active');

      workspace.classList.remove('view-editor', 'view-preview');
      if (view === 'editor') {
        workspace.classList.add('view-editor');
      } else if (view === 'preview') {
        workspace.classList.add('view-preview');
      }
      // 'split' = no extra class
    });
  });

  // ─── Draggable divider ───────────────────────────────────────────────────────

  divider.addEventListener('mousedown', function (e) {
    isDragging = true;
    dragStartX = e.clientX;
    dragStartWidth = editorPane.getBoundingClientRect().width;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function (e) {
    if (!isDragging) return;
    const workspaceWidth = workspace.getBoundingClientRect().width;
    const delta = e.clientX - dragStartX;
    let newWidth = dragStartWidth + delta;

    // Clamp: min 20%, max 80%
    const minW = workspaceWidth * 0.2;
    const maxW = workspaceWidth * 0.8;
    newWidth = Math.max(minW, Math.min(maxW, newWidth));

    const pct = (newWidth / workspaceWidth * 100).toFixed(2);
    editorPane.style.flex = `0 0 ${pct}%`;
  });

  document.addEventListener('mouseup', function () {
    if (isDragging) {
      isDragging = false;
      divider.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });

  // ─── Responsive: default to preview-only on narrow screens ──────────────────

  function applyResponsiveDefault() {
    if (window.innerWidth < 768) {
      // On mobile, activate preview button by default
      const previewBtn = document.querySelector('.view-toggle button[data-view="preview"]');
      if (previewBtn && !workspace.classList.contains('view-editor') && !workspace.classList.contains('view-preview')) {
        previewBtn.click();
      }
    }
  }

  // ─── Init ────────────────────────────────────────────────────────────────────

  function init() {
    setupMarked();
    editor.value = EXAMPLES['quick-start'];
    renderPreview();
    applyResponsiveDefault();
  }

  // Wait for all scripts to load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
